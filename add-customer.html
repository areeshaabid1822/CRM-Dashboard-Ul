        </div>

        <input type="text"
        placeholder="Search Employee..."
        class="crmEmpSearchBox">

        <button class="crmEmpNotifyBtn">
            <i class="fa-solid fa-bell"></i>
        </button>

        <button class="crmEmpProfileBtn">
            <i class="fa-solid fa-user"></i>
        </button>

    </div>

</header>


<aside class="crmEmpSideBar">

    <ul class="crmEmpMenuList">

        <li><a href="customers.html"><i class="fa-solid fa-users"></i> Customers</a></li>

<!-- MAIN -->
<div class="main">



<!-- FORM SECTION -->
<div class="form-box">

<h2>Add New Customer</h2>

<form>

<div class="input-group">
<label>Name</label>
<input type="text" placeholder="Enter full name">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter email">
</div>

<div class="input-group">
<label>Phone</label>
<input type="text" placeholder="Enter phone number">
</div>

<div class="input-group">
<label>Address</label>
<input type="text" placeholder="Enter address">
</div>

<div class="input-group">
<label>Status</label>
<select>
<option>Active</option>
<option>Inactive</option>
</select>
</div>

<button type="submit">Save Customer</button>

</form>

</div>

</div>

</div>

<script src="script.js"></script>
</body>
